# Personal motor insurance preset.
# Values are calibrated so that generated development triangles fall within
# the P5-P95 bands observed across the curated Schedule P private passenger
# auto reference data (data/reference/schedule p/ppauto_pos98-07, 96
# hand-curated companies).
name: motor-personal
book:
  growth_factor: 1.03
  size_volatility: 0.06
  spread: 0.4
  sum_insured_median: 20000
  sum_insured_inflation: 1.03
  excess_choices:
    - {value: 0, weight: 0.10}
    - {value: 100, weight: 0.20}
    - {value: 300, weight: 0.30}
    - {value: 500, weight: 0.30}
    - {value: 1000, weight: 0.10}
  premium_rate_factor: 0.035
claims:
  base_frequency: 0.12
  report_lag_median: 2
  report_lag_sigma: 1.2
  severity:
    third_party_weight: 0.20
    own_damage_median_fraction: 0.12
    own_damage_sigma: 1.0
    third_party_scale: 4000
    third_party_alpha: 2.2
  # Report-to-close lag. The base shape/mean_days (with the size stretch)
  # govern own-damage claims, which settle fast; third_party_shape and
  # third_party_mean_days give third-party (bodily-injury) claims a much
  # slower tail, so paid development continues into later ages as in the
  # Schedule P reference companies. Paid ATA age 2-3 is the tightest-margin
  # metric in the realism gate - re-check it after any change to paid
  # development.
  close_lag:
    shape: 1.2
    mean_days: 120
    size_threshold: 20000
    size_multiplier: 6
    risk_loading: 0.3
    third_party_shape: 1.0
    third_party_mean_days: 680
  # Claims inflation applied by occurrence year to every claim's ground-up
  # loss. Stochastic: each year's factor is `mean` times lognormal noise of
  # sigma `volatility`, compounded from 1.0 in the start year.
  inflation:
    mean: 1.04
    volatility: 0.015
  # Probability a reported claim closes without payment. 0 switches nil
  # claims off.
  nil_probability: 0.08
  # Recoveries: money coming back on own-damage claims after they close.
  # Salvage sells the insured vehicle's wreck; subrogation recovers the
  # payout from an at-fault third party. Each recovery is a Beta-distributed
  # share of the claim's gross paid, received a lognormal lag after close.
  # probability 0 switches a recovery type off.
  recoveries:
    salvage:
      probability: 0.10
      mean_share: 0.15
      concentration: 10
      lag_median_days: 21
      lag_sigma: 0.5
    subrogation:
      probability: 0.20
      mean_share: 0.80
      concentration: 10
      lag_median_days: 180
      lag_sigma: 0.7
  # Reopening: a closed claim can reopen once - the case is re-raised a
  # lognormal lag after the first close, a second episode develops and pays
  # an additional amount (the reopen estimate is `estimate_factor` times the
  # original initial estimate, with lognormal noise), then the claim closes
  # for good. claims.csv shows the final close date. probability 0 switches
  # reopening off.
  reopening:
    probability: 0.04
    estimate_factor: 0.45
    estimate_sigma: 0.5
    lag_median_days: 90
    lag_sigma: 0.7
runoff:
  case_adequacy_mean: 1.0
  case_adequacy_sigma: 0.35
  payments_per_year: 2.5
  settlement_share: 0.4
  concentration: 1.0
  revisions_per_year: 4
  revision_sigma: 0.3
